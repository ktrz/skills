# Tracker configuration
# ──────────────────────
# Used by any skill that touches an issue tracker (create-pr,
# request-review, plan-feature, plan-my-day, commit-message-format, etc.).
#
# Two install locations, checked in this order (first hit wins):
#
#   1. <repo_root>/.claude/tracker.yaml — repo-local, overrides the shared
#      default when this specific project uses a different backend (e.g.
#      Jira at work, Linear in a side project). Resolved from
#      `git rev-parse --show-toplevel`.
#
#   2. ~/.claude/tracker.yaml — shared default across all projects that
#      don't declare their own.
#
# The two files share this schema. Whether to commit a repo-local copy or
# add it to .gitignore is a team call — commit it to share the setup,
# gitignore it when it carries personal values (cloud IDs, transition IDs).
#
# Per-skill config files (~/.claude/<skill>.yaml) exist for non-tracker
# settings (Slack channel, output paths, etc.) — they no longer carry a
# `tracker:` block, so every skill running in a repo agrees on the backend.
#
# See <skill>/references/tracker.md for dispatch rules per backend.

tracker:
  # Pick one: jira | linear | github | clickup
  type: jira

  # ── Jira ─────────────────────────────────────────────────────────
  jira:
    # UUID from https://<your-org>.atlassian.net/_edge/tenant_info
    cloud_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"

    # Project keys used to match branch names (e.g. "PROJ" matches
    # "user/proj-123-slug").
    project_keys:
      - PROJ

    # Browse URL prefix (no trailing slash).
    base_url: "https://your-org.atlassian.net/browse"

    # Transition id for "In Review". Get via:
    #   GET /rest/api/3/issue/{issueKey}/transitions
    in_review_transition_id: "21"

  # ── Linear ───────────────────────────────────────────────────────
  # linear:
  #   workspace: "acme"           # URL slug at linear.app/<workspace>
  #   team_keys:
  #     - ENG
  #   in_review_state_name: "In Review"

  # ── GitHub ───────────────────────────────────────────────────────
  # github:
  #   repo: "owner/name"
  #   in_review_label: "in-review"

  # ── ClickUp ──────────────────────────────────────────────────────
  # clickup:
  #   team_id: "12345"
  #   list_ids:
  #     - "67890"
  #   in_review_status_name: "in review"
