# plan-feature configuration
# ──────────────────────────
# Most users don't need this file. Tracker settings no longer live here —
# they're resolved from <repo>/.claude/tracker.yaml (repo-local, optional)
# or ~/.claude/tracker.yaml (shared default). See _shared/tracker.example.yaml
# for the schema.
#
# This file only exists for skill-specific, non-tracker overrides (none are
# required today — plan-feature works without it).
#
#   cp ~/.claude/skills/plan-feature/config.example.yaml ~/.claude/plan-feature.yaml
